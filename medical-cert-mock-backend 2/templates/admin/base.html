<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI 证件审核后台{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.983-2.999A8.99 8.99 0 0112 21C7.03 21 3 16.97 3 12S7.03 3 12 3a8.99 8.99 0 016.983 3.001z"/></svg>
                </div>
                <div class="brand-text"><h1>CertAudit</h1><span>医疗证件审核</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>数据概览</span>
                </a>
                <a href="/upload" class="nav-item {% if request.path == '/upload' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m14-7l-4-4-4 4m4-4v12"/></svg>
                    <span>单张审核</span>
                </a>
                <a href="/batch" class="nav-item {% if request.path == '/batch' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                    <span>批量审核</span>
                </a>
                <div class="nav-divider"></div>
                <a href="/review" class="nav-item {% if request.path == '/review' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V4a2 2 0 10-4 0v1.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    <span>人工复审</span>
                    <span class="nav-badge" id="nav-review-count" style="display:none"></span>
                </a>
                <a href="/duplicates" class="nav-item {% if request.path == '/duplicates' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    <span>重复检测</span>
                    <span class="nav-badge badge-warn" id="nav-dup-count" style="display:none"></span>
                </a>
                <div class="nav-divider"></div>
                <a href="/records" class="nav-item {% if request.path == '/records' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <span>审核记录</span>
                </a>
                <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span>模型配置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="provider-badge badge-{{ config.get('llm_provider', 'mock') }}">
                    <span class="provider-dot"></span>
                    {{ config.get('llm_provider', 'mock') | upper }}
                </div>
            </div>
        </aside>

        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block scripts %}{% endblock %}
    <script>
    async function updateBadges() {
        try {
            const res = await fetch('/api/stats');
            const s = await res.json();
            const re = document.getElementById('nav-review-count');
            const de = document.getElementById('nav-dup-count');
            if (re) { s.needs_review > 0 ? (re.textContent = s.needs_review, re.style.display = 'inline-flex') : re.style.display = 'none'; }
            if (de) { s.duplicate_count > 0 ? (de.textContent = s.duplicate_count, de.style.display = 'inline-flex') : de.style.display = 'none'; }
        } catch(e) {}
    }
    updateBadges();
    </script>
</body>
</html>
